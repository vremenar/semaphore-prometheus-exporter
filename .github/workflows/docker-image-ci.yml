name: CI/CD Pipeline

env:
  GHCR: ghcr.io
  DOCKER: docker.io
  IMAGENAME: semaphore-exporter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 22 1 * *'

jobs:
  # ─────────────────────────────────────────────
  # 1. Source vulnerability scan
  # ─────────────────────────────────────────────
  vulnerability-scan:
    name: Source Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Perform Scan
        uses: ShiftLeftSecurity/scan-action@master

  # ─────────────────────────────────────────────
  # 2. Test & Build Go application
  # ─────────────────────────────────────────────
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs:
      - vulnerability-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Build binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w" -o semaphore-exporter-linux-amd64 .

      - name: Build binary (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
          go build -trimpath -ldflags="-s -w" -o semaphore-exporter-linux-arm64 .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: semaphore-exporter-linux-*
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. Build & push Docker image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - test-and-build
    # Only push on main branch — not on PRs
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR }}/vremenar/${{ env.IMAGENAME }}
            ${{ env.DOCKER }}/vremenar/${{ env.IMAGENAME }}
          labels: |
            org.opencontainers.image.title=semaphore-exporter
            org.opencontainers.image.description=Prometheus exporter for Semaphore UI
            org.opencontainers.image.vendor=vremenar

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR }}/vremenar/${{ env.IMAGENAME }}:latest
            ${{ env.GHCR }}/vremenar/${{ env.IMAGENAME }}:${{ steps.date.outputs.date }}
            ${{ env.DOCKER }}/vremenar/${{ env.IMAGENAME }}:latest
            ${{ env.DOCKER }}/vremenar/${{ env.IMAGENAME }}:${{ steps.date.outputs.date }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Image vulnerability scan (Trivy)
  # ─────────────────────────────────────────────
  image-vulnerability-scan:
    name: Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.GHCR }}/vremenar/${{ env.IMAGENAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
